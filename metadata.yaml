name: astrbot_plugin_chess_engine
display_name: 象棋引擎插件
short_desc: 支持 Pikafish、xqwlight、elephantfish 等多种象棋引擎，可通过聊天命令安装和切换
desc: 提供统一的象棋引擎管理接口，支持安装/切换多种引擎（xqwlight/Pikafish/elephantfish/random），Pikafish 支持安装后手动选择具体系统版本，对外提供 HTTP 分析端点兼容 chess_arena 插件。
author: 九喵
version: v1.0.2
repo: https://github.com/hckerelauk-git/astrbot_plugin_chess_engine
help: |
  ## 象棋引擎插件 v1.0.2

  ### 聊天命令
  - `安装象棋引擎 <名称>` — 下载安装引擎（支持 pikafish、elephantfish）
  - `卸载象棋引擎 <名称>` — 卸载引擎
  - `切换象棋引擎 <名称>` — 切换当前引擎
  - `象棋引擎状态` — 查看当前引擎信息
  - `象棋引擎列表` — 列出所有支持的引擎
  - `列出象棋引擎二进制` — 查看 Pikafish 解压后可选版本
  - `选择象棋引擎版本 <编号>` — 按编号手动选择当前系统对应版本
  - `设置象棋引擎路径 <完整路径>` — 直接指定某个可执行文件

  ### 引擎说明
  - **xqwlight**：平台 API，零本地消耗（默认）
  - **pikafish**：最强开源引擎，需下载预编译二进制
  - **elephantfish**：轻量 Python 引擎，pip install
  - **random**：随机走法，测试用

  ### Pikafish 版本选择
  Pikafish 解压后会保留多个系统版本。请先执行 `列出象棋引擎二进制`，再用 `选择象棋引擎版本 <编号>` 手动选择当前系统对应的版本，避免 Linux 误选到 macOS 版本。

  ### Linux 注意
  选中版本后会自动添加执行权限。如仍报 `Permission denied`，请确认你选的是 Linux 可执行文件。

  ### 对接 chess_arena
  1. 本插件配置 `http_port=18080`
  2. chess_arena 配置 `engine_mode=custom_http`，`custom_engine_http_url=http://127.0.0.1:18080/analyze`
